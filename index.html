<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cyber Pixel Quiz</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body>
  <div class="wrap">
    <main class="game-shell" aria-label="4択クイズゲーム">
      <header class="hud" id="hud">
        <div class="brand">
          <span class="brand__eyebrow">Neon Pixel Knowledge Dive</span>
          <strong class="brand__title">Cyber Pixel Quiz</strong>
        </div>
        <div class="stats">
          <div class="chip" aria-live="polite">
            <span class="chip__label">Category</span>
            <span class="chip__value" id="categoryName">Select</span>
          </div>
          <div class="chip chip--menu-hidden" aria-live="polite">
            <span class="chip__label">Question</span>
            <span class="chip__value" id="questionCounter">0 / 0</span>
          </div>
          <div class="chip chip--menu-hidden" aria-live="polite">
            <span class="chip__label">Score</span>
            <span class="chip__value" id="scoreValue">0</span>
          </div>
          <div class="chip" aria-live="polite">
            <span class="chip__label">Status</span>
            <span class="chip__value blink" id="statusValue">Menu</span>
          </div>
        </div>
      </header>

      <section class="menu show" id="menuScreen">
        <div class="panel menu-panel">
          <p class="menu-lead">
            遊びたいクイズジャンルを選んでください。
          </p>
          <div class="category-grid" id="categoryGrid"></div>
          <div class="menu-actions">
            <div class="menu-selected" id="menuSelectedText">
              ジャンルを選択すると、ここに説明が表示されます。
            </div>
            <div class="actions">
              <button class="pixel-btn" id="startBtn" disabled>Start Quiz</button>
            </div>
          </div>
        </div>
      </section>

      <section class="screen" id="quizScreen">
        <div class="panel">
          <div class="meter-wrap">
            <div class="meter-label">
              <span>Progress</span>
              <span id="progressText">0%</span>
            </div>
            <div class="meter" aria-hidden="true">
              <div class="meter__bar" id="progressBar"></div>
            </div>
          </div>

          <div class="question-card">
            <div class="question-number" id="questionNumber">Question 01</div>
            <h1 class="question-text" id="questionText">ここに問題文が表示されます。</h1>
          </div>

          <div class="choices" id="choices" role="list"></div>

          <div class="bottom-bar">
            <div class="message" id="messageBox" aria-live="polite">
              4つの選択肢から正解を選んでください。
            </div>
            <div class="actions quiz-actions">
              <button class="pixel-btn" id="nextBtn" disabled>Next</button>
              <div class="quiz-safe-actions">
                <button class="pixel-btn pixel-btn--secondary" id="backToMenuBtn">Menu</button>
                <button class="pixel-btn pixel-btn--secondary" id="restartBtn">Restart</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="result" id="resultScreen" aria-live="polite">
        <div class="result-badge">Quiz Complete</div>
        <h2 class="result-title">System Clear</h2>
        <p class="result-score" id="finalScore">0 / 5</p>
        <p class="result-text" id="resultText"></p>
        <div class="actions actions--center">
          <button class="pixel-btn" id="retryBtn">Play Again</button>
          <button class="pixel-btn" id="resultMenuBtn">Back To Menu</button>
        </div>
      </section>
    </main>
  </div>

  <script src="./assets/js/data/frontend-quiz-data.js"></script>
  <script src="./assets/js/data/backend-quiz-data.js"></script>
  <script src="./assets/js/data/it-passport-quiz-data.js"></script>
  <script src="./assets/js/data/basic-info-quiz-data.js"></script>
  <script src="./assets/js/data/applied-info-quiz-data.js"></script>
  <script src="./assets/js/data/g-cert-quiz-data.js"></script>
  <script src="./assets/js/app.js"></script>
</body>

</html>
